name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Developer ID Certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12" ]; then
            echo "Missing secret: APPLE_CERTIFICATE_P12" >&2
            exit 1
          fi

          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "Missing secret: APPLE_CERTIFICATE_PASSWORD" >&2
            exit 1
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Prepare Sparkle Tools
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Missing secret: SPARKLE_PRIVATE_KEY" >&2
            exit 1
          fi

          SPARKLE_TOOLS=$(find ~/Library/Developer/Xcode/DerivedData -name generate_keys 2>/dev/null | head -1)
          if [ -z "$SPARKLE_TOOLS" ]; then
            echo "Resolving packages to find Sparkle tools..."
            xcodebuild -resolvePackageDependencies -project aizen.xcodeproj
            SPARKLE_TOOLS=$(find ~/Library/Developer/Xcode/DerivedData -name generate_keys 2>/dev/null | head -1)
          fi

          printf "%s" "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle-key.txt"
          echo "SPARKLE_TOOLS_DIR=$(dirname $SPARKLE_TOOLS)" >> $GITHUB_ENV

      - name: Extract Version from Tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Install Provisioning Profiles
        env:
          APPLE_PROVISIONING_PROFILE_APP: ${{ secrets.APPLE_PROVISIONING_PROFILE_APP }}
          APPLE_PROVISIONING_PROFILE_WIDGET: ${{ secrets.APPLE_PROVISIONING_PROFILE_WIDGET }}
        run: |
          if [ -z "$APPLE_PROVISIONING_PROFILE_APP" ]; then
            echo "Missing secret: APPLE_PROVISIONING_PROFILE_APP" >&2
            exit 1
          fi

          if [ -z "$APPLE_PROVISIONING_PROFILE_WIDGET" ]; then
            echo "Missing secret: APPLE_PROVISIONING_PROFILE_WIDGET" >&2
            exit 1
          fi

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          echo "$APPLE_PROVISIONING_PROFILE_APP" | base64 --decode > /tmp/aizen-app.provisionprofile
          echo "$APPLE_PROVISIONING_PROFILE_WIDGET" | base64 --decode > /tmp/aizen-widget.provisionprofile

          cp /tmp/aizen-app.provisionprofile "$PROFILE_DIR/"
          cp /tmp/aizen-widget.provisionprofile "$PROFILE_DIR/"

          security cms -D -i /tmp/aizen-app.provisionprofile > /tmp/aizen-app-profile.plist
          security cms -D -i /tmp/aizen-widget.provisionprofile > /tmp/aizen-widget-profile.plist

          APP_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/aizen-app-profile.plist)
          WIDGET_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/aizen-widget-profile.plist)

          echo "APP_PROFILE_NAME=$APP_PROFILE_NAME" >> $GITHUB_ENV
          echo "WIDGET_PROFILE_NAME=$WIDGET_PROFILE_NAME" >> $GITHUB_ENV

          rm /tmp/aizen-app.provisionprofile /tmp/aizen-widget.provisionprofile
          rm /tmp/aizen-app-profile.plist /tmp/aizen-widget-profile.plist

      - name: Build and Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -scheme aizen \
            -archivePath "$RUNNER_TEMP/aizen.xcarchive" \
            -configuration Release \
            MARKETING_VERSION="$VERSION" \
            2>&1 | xcpretty || xcodebuild archive \
            -scheme aizen \
            -archivePath "$RUNNER_TEMP/aizen.xcarchive" \
            -configuration Release \
            MARKETING_VERSION="$VERSION"

      - name: Export Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ ! -d "$RUNNER_TEMP/aizen.xcarchive" ]; then
            echo "Archive missing at $RUNNER_TEMP/aizen.xcarchive. Check the Build and Archive step for the actual xcodebuild failure." >&2
            exit 1
          fi

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.benrostudios.aizen</key>
              <string>$APP_PROFILE_NAME</string>
              <key>com.benrostudios.aizen.aizenWidget</key>
              <string>$WIDGET_PROFILE_NAME</string>
            </dict>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/aizen.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Create ZIP Archive
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/aizen.app" \
            "$RUNNER_TEMP/aizen-$VERSION.zip"

      - name: Sign Update with EdDSA
        run: |
          set -euo pipefail

          if [ -z "${SPARKLE_TOOLS_DIR:-}" ]; then
            echo "Missing environment variable: SPARKLE_TOOLS_DIR" >&2
            exit 1
          fi

          if [ ! -x "$SPARKLE_TOOLS_DIR/sign_update" ]; then
            echo "sign_update not found or not executable at $SPARKLE_TOOLS_DIR/sign_update" >&2
            exit 1
          fi

          if [ ! -s "$RUNNER_TEMP/sparkle-key.txt" ]; then
            echo "Sparkle private key file missing or empty at $RUNNER_TEMP/sparkle-key.txt" >&2
            exit 1
          fi

          if [ ! -f "$RUNNER_TEMP/aizen-$VERSION.zip" ]; then
            echo "Archive to sign not found at $RUNNER_TEMP/aizen-$VERSION.zip" >&2
            exit 1
          fi

          echo "Using sign_update at $SPARKLE_TOOLS_DIR/sign_update"
          set +e
          SIGNATURE=$("$SPARKLE_TOOLS_DIR/sign_update" --ed-key-file "$RUNNER_TEMP/sparkle-key.txt" -p "$RUNNER_TEMP/aizen-$VERSION.zip" 2>"$RUNNER_TEMP/sign_update.stderr")
          SIGN_EXIT_CODE=$?
          set -e

          if [ $SIGN_EXIT_CODE -ne 0 ]; then
            echo "sign_update failed with exit code $SIGN_EXIT_CODE" >&2
            if [ -s "$RUNNER_TEMP/sign_update.stderr" ]; then
              cat "$RUNNER_TEMP/sign_update.stderr" >&2
            fi
            exit $SIGN_EXIT_CODE
          fi

          if [ -z "$SIGNATURE" ]; then
            echo "sign_update returned an empty signature" >&2
            if [ -s "$RUNNER_TEMP/sign_update.stderr" ]; then
              cat "$RUNNER_TEMP/sign_update.stderr" >&2
            fi
            exit 1
          fi

          if [ -s "$RUNNER_TEMP/sign_update.stderr" ]; then
            cat "$RUNNER_TEMP/sign_update.stderr"
          fi

          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/aizen-$VERSION.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Update Appcast
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aizen-$VERSION.zip"
          FILE_SIZE=$(stat -f%z "$RUNNER_TEMP/aizen-$VERSION.zip")
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          
          cat > docs/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>aizen</title>
                  <language>en</language>
                  <item>
                      <title>Version $VERSION</title>
                      <sparkle:version>$VERSION</sparkle:version>
                      <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                      <pubDate>$PUB_DATE</pubDate>
                      <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                      <enclosure
                          url="$DOWNLOAD_URL"
                          $SPARKLE_SIGNATURE
                          length="$FILE_SIZE"
                          type="application/octet-stream" />
                  </item>
              </channel>
          </rss>
          EOF

      - name: Commit Updated Appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "chore: update appcast for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/aizen-${{ env.VERSION }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
